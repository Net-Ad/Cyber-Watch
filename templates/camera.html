<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Camera Source</title>
    <style>
        body { background: #050816; color: white; font-family: Inter, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        video { width: 400px; border-radius: 12px; border: 2px solid #00d9ff; }
        #status { margin-top: 20px; color: #00d9ff; font-size: 18px; font-weight: 600; }
        button { margin-top: 20px; padding: 12px 30px; background: linear-gradient(90deg, #00d9ff, #2563eb); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; font-size: 15px; width: auto; }
    </style>
</head>
<body>
    <h2>CYBER<span style="color:#00d9ff">WATCH</span> — Camera Source</h2>
    <video id="localVideo" autoplay muted playsinline></video>
    <div id="status">Waiting to start...</div>
    <button onclick="startCamera()">Start Streaming</button>

    <script>
        const RAILWAY_URL = window.location.origin;
        let ws;
        let pc;
        let localStream;

        const config = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" }
            ]
        };

        async function startCamera() {
            document.getElementById("status").textContent = "Starting camera...";

            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            document.getElementById("localVideo").srcObject = localStream;

            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/camera`);

            ws.onopen = () => {
                document.getElementById("status").textContent = "Connected to server. Waiting for viewers...";
            };

            ws.onmessage = async (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === "viewer-request") {
                    await createOffer();
                } else if (msg.type === "answer") {
                    await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
                } else if (msg.type === "ice-candidate") {
                    await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
                }
            };

            ws.onclose = () => {
                document.getElementById("status").textContent = "Disconnected.";
            };
        }

        async function createOffer() {
            pc = new RTCPeerConnection(config);

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    ws.send(JSON.stringify({ type: "ice-candidate", candidate: event.candidate }));
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            ws.send(JSON.stringify({ type: "offer", sdp: pc.localDescription }));
            document.getElementById("status").textContent = "Streaming live!";
        }
    </script>
</body>
</html>
