<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live CCTV</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="dashboard">

    <aside class="sidebar">
        <div class="logo-area">
            <h1>CYBER</h1>
            <h1 class="logo-accent">WATCH</h1>
        </div>
        <nav>
            <a href="/dashboard">Dashboard</a>
            <a href="/live-cctv" class="active">Live CCTV</a>
            <a href="/threat-logs">Threat Logs</a>
            <a href="/analytics">Analytics</a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout">Logout</a>
        </div>
    </aside>

    <main class="main-content">

        <div class="topbar">
            <div class="topbar-left">
                <h2>Live CCTV Monitoring</h2>
                <p id="system-status">Real-time AI surveillance and security monitoring system</p>
            </div>
            <div class="topbar-right">
                <div id="live-clock"></div>
                <div class="profile-box">
                    <div class="status-dot"></div>
                    <span>{{ user }}</span>
                </div>
            </div>
        </div>

        <div class="cctv-grid">
            <div class="cctv-card">
                <div class="feed-topbar">
                    <h3>CAMERA 01</h3>
                    <div class="live-badge">● LIVE</div>
                </div>
                <video id="remoteVideo" autoplay playsinline class="camera-feed"></video>
                <p id="cam-status" style="color:#94a3b8; margin-top:10px; font-size:13px;">Connecting to camera...</p>
            </div>

            <div class="camera-side-panel">
                <div class="camera-info-card">
                    <h3>Camera Status</h3>
                    <p>ONLINE</p>
                </div>
                <div class="camera-info-card">
                    <h3>AI Detection</h3>
                    <p>ACTIVE</p>
                </div>
                <div class="camera-info-card">
                    <h3>Resolution</h3>
                    <p>1920x1080</p>
                </div>
                <div class="camera-info-card">
                    <h3>Frame Rate</h3>
                    <p>30 FPS</p>
                </div>
            </div>
        </div>

    </main>
</div>

<script>
function updateClock() {
    document.getElementById("live-clock").innerHTML = new Date().toLocaleString();
}
setInterval(updateClock, 1000);
updateClock();

const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" }
    ]
};

const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
const ws = new WebSocket(`${protocol}//${window.location.host}/ws/viewer`);
let pc;

ws.onopen = () => {
    document.getElementById("cam-status").textContent = "Connected to server. Waiting for camera...";
    ws.send(JSON.stringify({ type: "viewer-request" }));
};

ws.onmessage = async (event) => {
    const msg = JSON.parse(event.data);

    if (msg.type === "offer") {
        pc = new RTCPeerConnection(config);

        pc.ontrack = (event) => {
            document.getElementById("remoteVideo").srcObject = event.streams[0];
            document.getElementById("cam-status").textContent = "Live feed active!";
        };

        pc.onicecandidate = (event) => {
            if (event.candidate) {
                ws.send(JSON.stringify({ type: "ice-candidate", candidate: event.candidate }));
            }
        };

        await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        ws.send(JSON.stringify({ type: "answer", sdp: pc.localDescription }));

    } else if (msg.type === "ice-candidate") {
        if (pc) await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
    }
};

ws.onclose = () => {
    document.getElementById("cam-status").textContent = "Disconnected from server.";
};
</script>

</body>
</html>
