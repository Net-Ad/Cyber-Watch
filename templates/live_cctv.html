<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live CCTV - Cyber Watch</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Page-level two-column layout ── */
        .cctv-page-wrap {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* Each camera: big video left, tall stat sidebar right */
        .camera-row {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        /* ── Left: video panel ── */
        .feed-panel {
            flex: 1;
            min-width: 0;
            background: var(--card-bg, #1a1a2e);
            border: 1px solid var(--border-color, #2a2a4a);
            border-radius: 12px;
            overflow: hidden;
        }
        .feed-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 18px;
            border-bottom: 1px solid var(--border-color, #2a2a4a);
        }
        .feed-panel-header h3 {
            margin: 0;
            font-size: 11px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--text-primary, #c8c8e8);
        }
        .live-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-primary, #e0e0ff);
        }
        .live-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
        }
        .live-dot.on  { background: #e74c3c; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.85)} }

        .feed-video-wrap {
            position: relative;
            width: 100%;
            background: #05050f;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .feed-video-wrap img {
            width: 100%;
            height: auto;
            display: block;
        }
        .feed-timestamp {
            position: absolute;
            bottom: 10px; left: 14px;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.55);
            padding: 3px 9px;
            border-radius: 4px;
            font-family: monospace;
        }
        .feed-placeholder {
            color: #333;
            font-size: 13px;
            text-align: center;
            padding: 60px 20px;
            line-height: 1.8;
        }
        .feed-error-msg {
            color: #c0392b;
            font-size: 13px;
            text-align: center;
            padding: 60px 20px;
            line-height: 1.8;
        }

        /* ── Right: stat sidebar ── */
        .stat-sidebar {
            width: 220px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-card {
            background: var(--card-bg, #1a1a2e);
            border: 1px solid var(--border-color, #2a2a4a);
            border-radius: 10px;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stat-card-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.3px;
            color: #666;
            font-weight: 500;
        }

        .stat-card-value {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.1;
            color: #e0e0ff;
        }
        .stat-card-value.green  { color: #1db954; }
        .stat-card-value.red    { color: #e74c3c; }
        .stat-card-value.dim    { color: #3a3a5a; font-size: 16px; font-weight: 500; }

        /* Motion card extras */
        .motion-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .motion-badge {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 13px;
            font-weight: 700;
        }
        .mdot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: #1db954;
            flex-shrink: 0;
        }
        .mdot.alert { background: #e74c3c; animation: pulse 0.6s infinite; }
        .mlabel { color: #1db954; }
        .mlabel.alert { color: #e74c3c; }

        .clear-btn {
            background: transparent;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            color: #666;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1.2px;
            padding: 5px 11px;
            cursor: pointer;
            text-transform: uppercase;
            transition: border-color 0.2s, color 0.2s;
            white-space: nowrap;
        }
        .clear-btn:hover { border-color: #4a4a7a; color: #aaa; }

        .motion-time {
            font-size: 10px;
            color: #555;
            font-style: italic;
            font-family: monospace;
            margin-top: 2px;
        }

        /* Responsive */
        @media (max-width: 860px) {
            .camera-row { flex-direction: column; }
            .stat-sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; }
            .stat-card { flex: 1; min-width: 130px; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <aside class="sidebar">
        <div class="logo-area">
            <h1>CYBER<span class="logo-accent">WATCH</span></h1>
        </div>
        <div class="sidebar-clock"><div id="live-clock"></div></div>
        <nav>
            <a href="/dashboard">Dashboard</a>
            <a href="/live-cctv" class="active">Live CCTV</a>
            <a href="/threat-logs">Threat Logs</a>
            <a href="/analytics">Analytics</a>
        </nav>
        <div class="sidebar-footer"><a href="/logout">Logout</a></div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <h2 class="page-title">Live CCTV Monitoring</h2>
                <p class="text-muted">Real-time AI surveillance and security monitoring system</p>
            </div>
            <div class="topbar-right">
                <div class="profile-box">
                    <span class="status-dot green"></span>
                    <span>{{ user | default('admin') }}</span>
                </div>
            </div>
        </header>

        <div class="cctv-page-wrap" id="feedsContainer">
            <p style="text-align:center;color:#444;padding:60px 0;">Loading cameras…</p>
        </div>
    </main>
</div>

<script src="{{ url_for('static', filename='dashboard.js') }}"></script>
<script>
let feedIntervals = {};
let motionStates  = {};
let frameStats    = {};

const REFRESH_MS       = 400;
const MOTION_THRESHOLD = 3.5;
const PIXEL_DIFF       = 20;

async function init() {
    try {
        const r    = await fetch('/cctv-cameras');
        const data = await r.json();
        renderFeeds(data.cameras || []);
    } catch (e) {
        document.getElementById('feedsContainer').innerHTML =
            '<p style="color:#c0392b;text-align:center;padding:60px 0;">Failed to load camera list.</p>';
    }
}

function renderFeeds(cameras) {
    Object.values(feedIntervals).forEach(clearInterval);
    feedIntervals = {};
    motionStates  = {};
    frameStats    = {};

    const container = document.getElementById('feedsContainer');

    if (!cameras.length) {
        container.innerHTML =
            '<p style="text-align:center;color:#444;padding:60px 0;">No cameras configured.</p>';
        return;
    }

    container.innerHTML = '';

    cameras.forEach((cam, i) => {
        motionStates[i] = { prevData: null, active: false, timeout: null, lastEventTime: null, initialized: false };
        frameStats[i]   = { width: 0, height: 0, fps: 0, frameCount: 0, lastSecond: Date.now() };

        const row = document.createElement('div');
        row.className = 'camera-row';
        row.id = `camRow-${i}`;
        row.innerHTML = `
            <!-- Video panel -->
            <div class="feed-panel">
                <div class="feed-panel-header">
                    <h3>${escHtml(cam.name)}</h3>
                    <div class="live-pill">
                        <span class="live-dot" id="liveDot-${i}"></span>
                        <span id="liveLabel-${i}">Connecting</span>
                    </div>
                </div>
                <div class="feed-video-wrap" id="feedWrap-${i}">
                    <p class="feed-placeholder">Connecting to camera…</p>
                    <canvas id="motionCanvas-${i}" style="display:none;"></canvas>
                </div>
            </div>

            <!-- Stat sidebar -->
            <div class="stat-sidebar">

                <div class="stat-card">
                    <span class="stat-card-label">Camera Status</span>
                    <span class="stat-card-value dim" id="statStatus-${i}">—</span>
                </div>

                <div class="stat-card">
                    <span class="stat-card-label">AI Detection</span>
                    <span class="stat-card-value dim" id="statAI-${i}">—</span>
                </div>

                <div class="stat-card">
                    <span class="stat-card-label">Resolution</span>
                    <span class="stat-card-value dim" id="statRes-${i}">—</span>
                </div>

                <div class="stat-card">
                    <span class="stat-card-label">Frame Rate</span>
                    <span class="stat-card-value dim" id="statFPS-${i}">—</span>
                </div>

                <div class="stat-card">
                    <span class="stat-card-label">Motion Detection</span>
                    <div class="motion-row">
                        <div class="motion-badge">
                            <span class="mdot" id="mDot-${i}"></span>
                            <span class="mlabel" id="mLabel-${i}">—</span>
                        </div>
                        <button class="clear-btn" onclick="clearMotion(${i})">CLEAR</button>
                    </div>
                    <div class="motion-time" id="mTime-${i}"></div>
                </div>

            </div>`;

        container.appendChild(row);
    });

    setTimeout(() => cameras.forEach((_, i) => startFeed(i)), 50);
}

function startFeed(i) {
    const proxyBase = `/cctv-proxy?index=${i}`;

    function pullFrame() {
        const img = new Image();
        img.onload = () => {
            const wrap  = document.getElementById(`feedWrap-${i}`);
            const dot   = document.getElementById(`liveDot-${i}`);
            const label = document.getElementById(`liveLabel-${i}`);
            if (!wrap) return;

            let liveImg = document.getElementById(`liveImg-${i}`);
            if (!liveImg) {
                wrap.innerHTML = `
                    <img id="liveImg-${i}" style="width:100%;height:auto;display:block;">
                    <span class="feed-timestamp" id="feedTS-${i}"></span>
                    <canvas id="motionCanvas-${i}" style="display:none;"></canvas>`;
                liveImg = document.getElementById(`liveImg-${i}`);
            }

            liveImg.src = img.src;
            const ts = document.getElementById(`feedTS-${i}`);
            if (ts) ts.textContent = new Date().toLocaleTimeString();

            dot.className     = 'live-dot on';
            label.textContent = 'Live';

            updateStats(i, img);
            runMotion(i, liveImg);
        };

        img.onerror = () => {
            const dot   = document.getElementById(`liveDot-${i}`);
            const label = document.getElementById(`liveLabel-${i}`);
            const wrap  = document.getElementById(`feedWrap-${i}`);
            if (!dot || !label) return;

            dot.className     = 'live-dot';
            label.textContent = 'OFFLINE';
            setOffline(i);

            if (!document.getElementById(`liveImg-${i}`) && wrap) {
                wrap.innerHTML =
                    `<p class="feed-error-msg">⚠ Camera offline or unreachable.<br>
                    <small style="color:#555;margin-top:6px;display:block;">
                    Update the URL in app.py → CAMERAS.</small></p>`;
            }
        };

        img.src = `${proxyBase}&_t=${Date.now()}`;
    }

    pullFrame();
    feedIntervals[i] = setInterval(pullFrame, REFRESH_MS);
}

function updateStats(i, img) {
    const stat = frameStats[i];
    if (!stat) return;

    const w = img.naturalWidth  || img.width;
    const h = img.naturalHeight || img.height;
    if (w && h) { stat.width = w; stat.height = h; }

    stat.frameCount++;
    const now = Date.now();
    if (now - stat.lastSecond >= 1000) {
        stat.fps = stat.frameCount;
        stat.frameCount = 0;
        stat.lastSecond = now;
    }

    const elStatus = document.getElementById(`statStatus-${i}`);
    const elAI     = document.getElementById(`statAI-${i}`);
    const elRes    = document.getElementById(`statRes-${i}`);
    const elFPS    = document.getElementById(`statFPS-${i}`);

    if (elStatus) { elStatus.textContent = 'ONLINE';  elStatus.className = 'stat-card-value green'; }
    if (elAI)     { elAI.textContent     = 'ACTIVE';  elAI.className     = 'stat-card-value green'; }
    if (elRes)    { elRes.textContent    = stat.width ? `${stat.width}×${stat.height}` : '—'; elRes.className = 'stat-card-value'; }
    if (elFPS)    { elFPS.textContent    = stat.fps   ? `${stat.fps} FPS` : '—';               elFPS.className = 'stat-card-value'; }
}

function setOffline(i) {
    const elStatus = document.getElementById(`statStatus-${i}`);
    const elAI     = document.getElementById(`statAI-${i}`);
    const elRes    = document.getElementById(`statRes-${i}`);
    const elFPS    = document.getElementById(`statFPS-${i}`);
    if (elStatus) { elStatus.textContent = 'OFFLINE';  elStatus.className = 'stat-card-value red'; }
    if (elAI)     { elAI.textContent     = 'INACTIVE'; elAI.className     = 'stat-card-value dim'; }
    if (elRes)    { elRes.textContent    = '—';         elRes.className    = 'stat-card-value dim'; }
    if (elFPS)    { elFPS.textContent    = '—';         elFPS.className    = 'stat-card-value dim'; }
}

function runMotion(i, imgEl) {
    const canvas = document.getElementById(`motionCanvas-${i}`);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = 160; canvas.height = 90;
    try {
        ctx.drawImage(imgEl, 0, 0, 160, 90);
        const frame = ctx.getImageData(0, 0, 160, 90);
        const state = motionStates[i];
        if (!state.prevData) { state.prevData = frame; return; }

        let diff = 0;
        for (let p = 0; p < frame.data.length; p += 4) {
            const d = (Math.abs(frame.data[p]   - state.prevData.data[p]) +
                       Math.abs(frame.data[p+1] - state.prevData.data[p+1]) +
                       Math.abs(frame.data[p+2] - state.prevData.data[p+2])) / 3;
            if (d > PIXEL_DIFF) diff++;
        }
        state.prevData = frame;
        setMotion(i, (diff / (160 * 90) * 100) > MOTION_THRESHOLD);
    } catch (e) {}
}

function setMotion(i, detected) {
    const dot   = document.getElementById(`mDot-${i}`);
    const label = document.getElementById(`mLabel-${i}`);
    const tEl   = document.getElementById(`mTime-${i}`);
    const state = motionStates[i];
    if (!dot || !label) return;

    if (!state.initialized) {
        state.initialized = true;
        dot.className     = 'mdot';
        label.textContent = 'NO MOTION DETECTED';
        label.className   = 'mlabel';
        if (tEl) tEl.textContent = `${new Date().toLocaleTimeString()}  Motion detection system online`;
    }

    if (detected && !state.active) {
        state.active        = true;
        state.lastEventTime = new Date();
        dot.className       = 'mdot alert';
        label.textContent   = 'MOTION DETECTED';
        label.className     = 'mlabel alert';
        if (tEl) tEl.textContent = `${state.lastEventTime.toLocaleTimeString()}  Motion event triggered`;
    }
    if (detected && state.timeout) { clearTimeout(state.timeout); state.timeout = null; }
    if (!detected && state.active && !state.timeout) {
        state.timeout = setTimeout(() => {
            state.active    = false;
            state.timeout   = null;
            dot.className   = 'mdot';
            label.textContent = 'NO MOTION DETECTED';
            label.className = 'mlabel';
            if (tEl && state.lastEventTime)
                tEl.textContent = `${state.lastEventTime.toLocaleTimeString()}  Last motion event`;
        }, 1500);
    }
}

function clearMotion(i) {
    const state = motionStates[i];
    if (!state) return;
    state.active   = false;
    state.prevData = null;
    if (state.timeout) { clearTimeout(state.timeout); state.timeout = null; }
    const dot   = document.getElementById(`mDot-${i}`);
    const label = document.getElementById(`mLabel-${i}`);
    const tEl   = document.getElementById(`mTime-${i}`);
    if (dot)   dot.className     = 'mdot';
    if (label) { label.textContent = 'NO MOTION DETECTED'; label.className = 'mlabel'; }
    if (tEl)   tEl.textContent   = `${new Date().toLocaleTimeString()}  Cleared by operator`;
}

function escHtml(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
