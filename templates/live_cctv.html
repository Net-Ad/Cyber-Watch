<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live CCTV - Cyber Watch</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Per-camera layout: video left, status sidebar right ── */
        .camera-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            margin-bottom: 28px;
        }

        /* ── Feed card (left) ── */
        .feed-card {
            flex: 1;
            min-width: 0;
            background: var(--card-bg, #1a1a2e);
            border: 1px solid var(--border-color, #2a2a4a);
            border-radius: 12px;
            overflow: hidden;
        }
        .feed-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 1px solid var(--border-color, #2a2a4a);
        }
        .feed-card-header h3 {
            margin: 0;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-primary, #e0e0ff);
        }
        .live-indicator { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; letter-spacing: 1px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .dot.red  { background: #e74c3c; animation: blink 1s infinite; }
        .dot.grey { background: #444; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

        .feed-img-wrap {
            position: relative;
            width: 100%;
            background: #060610;
            min-height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .feed-img-wrap img { width: 100%; height: auto; display: block; }
        .feed-overlay-status {
            position: absolute; bottom: 8px; left: 10px;
            font-size: 10px; color: rgba(255,255,255,0.45);
            background: rgba(0,0,0,0.6);
            padding: 2px 8px; border-radius: 4px;
            font-family: monospace;
        }
        .feed-error {
            color: #e74c3c; font-size: 13px;
            text-align: center; padding: 40px 20px; line-height: 1.8;
        }
        .feed-connecting {
            color: var(--text-muted, #555);
            font-size: 13px; padding: 40px; text-align: center;
        }

        /* ── Status sidebar (right) ── */
        .status-sidebar {
            width: 240px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .stat-card {
            background: var(--card-bg, #1a1a2e);
            border: 1px solid var(--border-color, #2a2a4a);
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted, #666);
            font-weight: 500;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary, #e0e0ff);
            line-height: 1.2;
        }
        .stat-value.green { color: #1db954; }
        .stat-value.red   { color: #e74c3c; }
        .stat-value.muted { color: #444; font-size: 15px; font-weight: 500; }

        /* Motion card */
        .stat-card.motion-card { gap: 8px; }
        .motion-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .motion-indicator {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; font-weight: 700;
        }
        .motion-dot { width: 9px; height: 9px; border-radius: 50%; background: #1db954; flex-shrink: 0; }
        .motion-dot.alert { background: #e74c3c; animation: blink 0.5s infinite; }
        .motion-label-text { color: #1db954; }
        .motion-label-text.alert { color: #e74c3c; }
        .clear-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border-color, #2a2a4a);
            border-radius: 5px;
            color: var(--text-muted, #888);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 4px 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
        }
        .clear-btn:hover { background: rgba(255,255,255,0.12); }
        .motion-timestamp {
            font-size: 10px;
            color: var(--text-muted, #555);
            font-family: monospace;
            font-style: italic;
        }

        /* Responsive: stack on small screens */
        @media (max-width: 800px) {
            .camera-layout { flex-direction: column; }
            .status-sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; }
            .stat-card { flex: 1; min-width: 120px; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <aside class="sidebar">
        <div class="logo-area">
            <h1>CYBER<span class="logo-accent">WATCH</span></h1>
        </div>
        <div class="sidebar-clock"><div id="live-clock"></div></div>
        <nav>
            <a href="/dashboard">Dashboard</a>
            <a href="/live-cctv" class="active">Live CCTV</a>
            <a href="/threat-logs">Threat Logs</a>
            <a href="/analytics">Analytics</a>
        </nav>
        <div class="sidebar-footer"><a href="/logout">Logout</a></div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <h2 class="page-title">Live CCTV Monitoring</h2>
                <p class="text-muted">Real-time IP camera surveillance — school network feed</p>
            </div>
            <div class="topbar-right">
                <div class="profile-box">
                    <span class="status-dot green"></span>
                    <span>{{ user | default('admin') }}</span>
                </div>
            </div>
        </header>

        <!-- ── Camera feeds ── -->
        <div id="feedsContainer">
            <p style="text-align:center;color:var(--text-muted,#888);padding:40px;">Loading cameras…</p>
        </div>
    </main>
</div>

<script src="{{ url_for('static', filename='dashboard.js') }}"></script>
<script>
// ============================================================
//  Hardcoded-camera CCTV viewer
//  Layout: video feed (left) + status sidebar (right) per camera
// ============================================================

let feedIntervals = {};
let motionStates  = {};
let frameStats    = {};

const REFRESH_MS       = 400;
const MOTION_THRESHOLD = 3.5;
const PIXEL_DIFF       = 20;

// ── Boot ─────────────────────────────────────────────────────
async function init() {
    try {
        const r    = await fetch('/cctv-cameras');
        const data = await r.json();
        renderFeeds(data.cameras || []);
    } catch (e) {
        document.getElementById('feedsContainer').innerHTML =
            '<p style="color:#e74c3c;text-align:center;padding:40px;">Failed to load camera list.</p>';
    }
}

// ── Build one camera-layout row per camera ────────────────────
function renderFeeds(cameras) {
    Object.values(feedIntervals).forEach(clearInterval);
    feedIntervals = {};
    motionStates  = {};
    frameStats    = {};

    const container = document.getElementById('feedsContainer');

    if (!cameras.length) {
        container.innerHTML =
            '<p style="text-align:center;color:var(--text-muted,#888);padding:40px;">No cameras configured.</p>';
        return;
    }

    container.innerHTML = '';

    cameras.forEach((cam, i) => {
        motionStates[i] = { prevData: null, active: false, timeout: null, lastEventTime: null, initialized: false };
        frameStats[i]   = { width: 0, height: 0, fps: 0, frameCount: 0, lastSecond: Date.now() };

        container.innerHTML += `
        <div class="camera-layout" id="camLayout-${i}">

            <!-- ── Video feed card ── -->
            <div class="feed-card">
                <div class="feed-card-header">
                    <h3>${escHtml(cam.name)}</h3>
                    <div class="live-indicator">
                        <span class="dot grey" id="liveDot-${i}"></span>
                        <span id="liveLabel-${i}">CONNECTING</span>
                    </div>
                </div>
                <div class="feed-img-wrap" id="feedWrap-${i}">
                    <p class="feed-connecting">Connecting…</p>
                    <canvas id="motionCanvas-${i}" style="display:none;"></canvas>
                </div>
            </div>

            <!-- ── Status sidebar ── -->
            <div class="status-sidebar">

                <div class="stat-card">
                    <span class="stat-label">Camera Status</span>
                    <span class="stat-value muted" id="statStatus-${i}">CONNECTING</span>
                </div>

                <div class="stat-card">
                    <span class="stat-label">AI Detection</span>
                    <span class="stat-value muted" id="statAI-${i}">STANDBY</span>
                </div>

                <div class="stat-card">
                    <span class="stat-label">Resolution</span>
                    <span class="stat-value muted" id="statRes-${i}">—</span>
                </div>

                <div class="stat-card">
                    <span class="stat-label">Frame Rate</span>
                    <span class="stat-value muted" id="statFPS-${i}">—</span>
                </div>

                <div class="stat-card motion-card">
                    <span class="stat-label">Motion Detection</span>
                    <div class="motion-header">
                        <div class="motion-indicator">
                            <span class="motion-dot" id="mDot-${i}"></span>
                            <span class="motion-label-text" id="mLabel-${i}">INITIALIZING…</span>
                        </div>
                        <button class="clear-btn" onclick="clearMotion(${i})">CLEAR</button>
                    </div>
                    <span class="motion-timestamp" id="mTime-${i}"></span>
                </div>

            </div>
        </div>`;
    });

    setTimeout(() => cameras.forEach((_, i) => startFeed(i)), 50);
}

// ── Poll frames ───────────────────────────────────────────────
function startFeed(i) {
    const proxyBase = `/cctv-proxy?index=${i}`;

    function pullFrame() {
        const img = new Image();
        const ts  = Date.now();

        img.onload = () => {
            const wrap  = document.getElementById(`feedWrap-${i}`);
            const dot   = document.getElementById(`liveDot-${i}`);
            const label = document.getElementById(`liveLabel-${i}`);
            if (!wrap) return;

            let liveImg = document.getElementById(`liveImg-${i}`);
            if (!liveImg) {
                wrap.innerHTML = `
                    <img id="liveImg-${i}" style="width:100%;height:auto;display:block;">
                    <span class="feed-overlay-status" id="feedStatus-${i}"></span>
                    <canvas id="motionCanvas-${i}" style="display:none;"></canvas>`;
                liveImg = document.getElementById(`liveImg-${i}`);
            }

            liveImg.src = img.src;
            document.getElementById(`feedStatus-${i}`).textContent =
                new Date().toLocaleTimeString();
            dot.className     = 'dot red';
            label.textContent = 'Live';

            updateStats(i, img);
            runMotion(i, liveImg);
        };

        img.onerror = () => {
            const dot   = document.getElementById(`liveDot-${i}`);
            const label = document.getElementById(`liveLabel-${i}`);
            const wrap  = document.getElementById(`feedWrap-${i}`);
            if (!dot || !label) return;
            dot.className     = 'dot grey';
            label.textContent = 'OFFLINE';

            setStatOffline(i);

            if (!document.getElementById(`liveImg-${i}`) && wrap) {
                wrap.innerHTML =
                    '<p class="feed-error">⚠ Camera offline or unreachable.<br>' +
                    '<small style="color:#555;margin-top:6px;display:block;">' +
                    'Update the URL in app.py → CAMERAS.</small></p>';
            }
        };

        img.src = `${proxyBase}&_t=${ts}`;
    }

    pullFrame();
    feedIntervals[i] = setInterval(pullFrame, REFRESH_MS);
}

// ── Stat helpers ──────────────────────────────────────────────
function updateStats(i, img) {
    const stat = frameStats[i];
    if (!stat) return;

    const w = img.naturalWidth  || img.width;
    const h = img.naturalHeight || img.height;
    if (w && h) { stat.width = w; stat.height = h; }

    stat.frameCount++;
    const now = Date.now();
    if (now - stat.lastSecond >= 1000) {
        stat.fps        = stat.frameCount;
        stat.frameCount = 0;
        stat.lastSecond = now;
    }

    const elStatus = document.getElementById(`statStatus-${i}`);
    const elAI     = document.getElementById(`statAI-${i}`);
    const elRes    = document.getElementById(`statRes-${i}`);
    const elFPS    = document.getElementById(`statFPS-${i}`);

    if (elStatus) { elStatus.textContent = 'ONLINE';  elStatus.className = 'stat-value green'; }
    if (elAI)     { elAI.textContent     = 'ACTIVE';  elAI.className     = 'stat-value green'; }
    if (elRes)    { elRes.textContent    = stat.width ? `${stat.width}×${stat.height}` : '—'; elRes.className = 'stat-value'; }
    if (elFPS)    { elFPS.textContent    = stat.fps   ? `${stat.fps} FPS` : '—';               elFPS.className = 'stat-value'; }
}

function setStatOffline(i) {
    const elStatus = document.getElementById(`statStatus-${i}`);
    const elAI     = document.getElementById(`statAI-${i}`);
    const elRes    = document.getElementById(`statRes-${i}`);
    const elFPS    = document.getElementById(`statFPS-${i}`);
    if (elStatus) { elStatus.textContent = 'OFFLINE';  elStatus.className = 'stat-value red'; }
    if (elAI)     { elAI.textContent     = 'INACTIVE'; elAI.className     = 'stat-value muted'; }
    if (elRes)    { elRes.textContent    = '—';         elRes.className    = 'stat-value muted'; }
    if (elFPS)    { elFPS.textContent    = '—';         elFPS.className    = 'stat-value muted'; }
}

// ── Motion detection ──────────────────────────────────────────
function runMotion(i, imgEl) {
    const canvas = document.getElementById(`motionCanvas-${i}`);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = 160; canvas.height = 90;
    try {
        ctx.drawImage(imgEl, 0, 0, 160, 90);
        const frame = ctx.getImageData(0, 0, 160, 90);
        const state = motionStates[i];
        if (!state.prevData) { state.prevData = frame; return; }

        let diff = 0;
        for (let p = 0; p < frame.data.length; p += 4) {
            const d = (Math.abs(frame.data[p]   - state.prevData.data[p]) +
                       Math.abs(frame.data[p+1] - state.prevData.data[p+1]) +
                       Math.abs(frame.data[p+2] - state.prevData.data[p+2])) / 3;
            if (d > PIXEL_DIFF) diff++;
        }
        state.prevData = frame;
        setMotion(i, (diff / (160 * 90) * 100) > MOTION_THRESHOLD);
    } catch (e) {}
}

function setMotion(i, detected) {
    const dot   = document.getElementById(`mDot-${i}`);
    const label = document.getElementById(`mLabel-${i}`);
    const tEl   = document.getElementById(`mTime-${i}`);
    const state = motionStates[i];
    if (!dot || !label) return;

    if (!state.initialized) {
        state.initialized = true;
        dot.className         = 'motion-dot';
        label.textContent     = 'NO MOTION DETECTED';
        label.className       = 'motion-label-text';
        if (tEl) tEl.textContent = `${new Date().toLocaleTimeString()}  Motion detection system online`;
    }

    if (detected && !state.active) {
        state.active        = true;
        state.lastEventTime = new Date();
        dot.className       = 'motion-dot alert';
        label.textContent   = 'MOTION DETECTED';
        label.className     = 'motion-label-text alert';
        if (tEl) tEl.textContent = `${state.lastEventTime.toLocaleTimeString()}  Motion event triggered`;
    }
    if (detected && state.timeout) { clearTimeout(state.timeout); state.timeout = null; }
    if (!detected && state.active && !state.timeout) {
        state.timeout = setTimeout(() => {
            state.active    = false;
            state.timeout   = null;
            dot.className   = 'motion-dot';
            label.textContent = 'NO MOTION DETECTED';
            label.className = 'motion-label-text';
            if (tEl && state.lastEventTime)
                tEl.textContent = `${state.lastEventTime.toLocaleTimeString()}  Last motion event`;
        }, 1500);
    }
}

function clearMotion(i) {
    const state = motionStates[i];
    if (!state) return;
    state.active   = false;
    state.prevData = null;
    if (state.timeout) { clearTimeout(state.timeout); state.timeout = null; }
    const dot   = document.getElementById(`mDot-${i}`);
    const label = document.getElementById(`mLabel-${i}`);
    const tEl   = document.getElementById(`mTime-${i}`);
    if (dot)   dot.className     = 'motion-dot';
    if (label) { label.textContent = 'NO MOTION DETECTED'; label.className = 'motion-label-text'; }
    if (tEl)   tEl.textContent   = `${new Date().toLocaleTimeString()}  Cleared by operator`;
}

function escHtml(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
